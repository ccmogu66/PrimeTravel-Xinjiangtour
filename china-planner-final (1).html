<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>China Travel Planner · Kimi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7;
  --white: #ffffff;
  --ink: #1c1917;
  --ink-60: #78716c;
  --ink-20: #e7e5e4;
  --ink-10: #f5f4f2;
  --red: #c0392b;
  --red-bg: #fdf2f1;
}

html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 1.5rem;
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--ink-20);
  flex-shrink: 0;
}

.logo-mark {
  width: 32px; height: 32px;
  background: var(--ink);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 16px; height: 16px; color: white; }

.logo-text {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 17px;
  color: var(--ink);
}

.header-tag {
  margin-left: auto;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-60);
  background: var(--ink-10);
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 2rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* welcome */
.welcome {
  text-align: center;
  padding: 3rem 1rem 1rem;
  max-width: 460px;
  margin: 0 auto;
}
.welcome h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 2rem;
  line-height: 1.2;
  margin-bottom: 0.6rem;
  color: var(--ink);
}
.welcome h1 em { font-style: italic; color: var(--red); }
.welcome p {
  font-size: 14px;
  color: var(--ink-60);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.starter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  justify-content: center;
}
.chip {
  font-size: 13px;
  padding: 7px 14px;
  border: 1px solid var(--ink-20);
  border-radius: 20px;
  cursor: pointer;
  background: var(--white);
  color: var(--ink);
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.chip:hover { background: var(--ink-10); border-color: var(--ink-60); }

/* bubbles */
.msg {
  display: flex;
  gap: 10px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; margin-top: 2px;
}
.avatar.ai {
  background: var(--ink);
  color: white;
}
.avatar.user {
  background: var(--red-bg);
  color: var(--red);
  border: 1px solid rgba(192,57,43,0.2);
}

.bubble {
  padding: 11px 15px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.75;
  max-width: calc(100% - 44px);
}
.msg.ai .bubble {
  background: var(--white);
  border: 1px solid var(--ink-20);
  border-top-left-radius: 4px;
  color: var(--ink);
}
.msg.user .bubble {
  background: var(--ink);
  color: white;
  border-top-right-radius: 4px;
}

.bubble strong { font-weight: 500; }
.bubble .day-head {
  display: block;
  font-weight: 500;
  color: var(--red);
  margin-top: 0.75em;
  margin-bottom: 0.1em;
}
.msg.user .bubble .day-head { color: #fca5a5; }

/* typing indicator */
.typing-dots span {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--ink-60);
  margin: 0 2px;
  animation: bounce 1.2s ease infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30%          { transform: translateY(-5px); }
}

/* ── INPUT BAR ── */
.input-area {
  flex-shrink: 0;
  background: var(--white);
  border-top: 1px solid var(--ink-20);
  padding: 1rem 1.5rem;
}

.input-row {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

textarea#chat-input {
  flex: 1;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 10px 14px;
  border: 1px solid var(--ink-20);
  border-radius: 12px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
  resize: none;
  min-height: 44px;
  max-height: 140px;
  overflow-y: auto;
  transition: border-color 0.15s;
}
textarea#chat-input:focus { border-color: var(--ink-60); background: var(--white); }
textarea#chat-input::placeholder { color: var(--ink-60); }

.send-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--ink); color: white;
  border: none; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, transform 0.1s;
}
.send-btn:hover:not(:disabled) { opacity: 0.82; transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.send-btn svg { width: 16px; height: 16px; }

.input-hint {
  max-width: 680px; margin: 0.5rem auto 0;
  font-size: 11px; color: var(--ink-60);
  text-align: center;
}


</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
    </svg>
  </div>
  <span class="logo-text">China Travel Planner</span>
  <span class="header-tag">Powered by Kimi</span>
</header>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h1>Plan your<br><em>China trip</em></h1>
    <p>Ask me anything — a full itinerary, visa tips, what to pack, hidden gems. Just type below.</p>
    <div class="starter-chips">
      <button class="chip" onclick="sendChip(this)">7 days in Xinjiang</button>
      <button class="chip" onclick="sendChip(this)">Best time to visit Yunnan</button>
      <button class="chip" onclick="sendChip(this)">Beijing + Shanghai 10 days</button>
      <button class="chip" onclick="sendChip(this)">Visa requirements for Americans</button>
      <button class="chip" onclick="sendChip(this)">Hidden gems off the beaten path</button>
      <button class="chip" onclick="sendChip(this)">Budget travel tips for China</button>
    </div>
  </div>
</div>

<div class="input-area">
<div class="input-row">
    <textarea id="chat-input" placeholder="Ask about any destination in China…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Powered by Kimi AI · Itineraries are suggestions only — verify local conditions before travel.</p>
</div>

<script>
  const SYSTEM = `You are an expert China travel consultant for international visitors. 
Be warm, specific, and practical. When giving itineraries, use this format:
- Start with a 1-sentence trip overview
- Use "Day 1:", "Day 2:" etc as headers
- Each day: morning / afternoon / evening with real place names
- End with 2-3 quick practical tips
Keep responses focused and conversational. No markdown symbols like ** or ##.
IMPORTANT: Always respond in English only. Never use Chinese characters, even for place names — use the romanized English version instead (e.g. "Urumqi" not "乌鲁木齐", "Kashgar" not "喀什").`;

  let history = [];
  let streaming = false;


  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function sendChip(btn) {
    document.getElementById('chat-input').value = btn.textContent;
    send();
  }

  function addMsg(role, html, raw) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '✦' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    div.appendChild(avatar);
    div.appendChild(bubble);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/(Day \d+[:\s][^\n]*)/g, '<span class="day-head">$1</span>')
      .replace(/\n/g, '<br>');
  }

  // ⬇ 把这里换成你的 Worker 地址
  const WORKER_URL = 'https://quiet-boat-71ea.chenchenghhhhh.workers.dev';

  async function send() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();

    if (!text || streaming) return;

    // Hide welcome
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    // Add user bubble
    addMsg('user', text.replace(/\n/g, '<br>'));
    history.push({ role: 'user', content: text });
    input.value = '';
    input.style.height = 'auto';

    // Disable
    streaming = true;
    document.getElementById('send-btn').disabled = true;
    document.querySelectorAll('.chip').forEach(c => c.style.pointerEvents = 'none');

    // Show typing
    showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'moonshot-v1-8k',
          max_tokens: 1024,
          stream: true,
          messages: [{ role: 'system', content: SYSTEM }, ...history]
        })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const bubble = addMsg('ai', '');
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of dec.decode(value).split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const d = line.slice(6).trim();
          if (d === '[DONE]') continue;
          try {
            const p = JSON.parse(d);
            const delta = p.choices?.[0]?.delta?.content;
            if (delta) {
              full += delta;
              bubble.innerHTML = formatText(full) + '<span style="display:inline-block;width:2px;height:1em;background:var(--ink-60);vertical-align:text-bottom;margin-left:1px;animation:blink .85s step-end infinite"></span>';
              document.getElementById('messages').scrollTop = 999999;
            }
          } catch {}
        }
      }

      bubble.innerHTML = formatText(full);
      history.push({ role: 'assistant', content: full });

    } catch (e) {
      removeTyping();
      addMsg('ai', `<span style="color:var(--red)">Sorry, something went wrong: ${e.message}</span>`);
    }

    streaming = false;
    document.getElementById('send-btn').disabled = false;
  }

  // blink keyframe
  const style = document.createElement('style');
  style.textContent = '@keyframes blink { 50% { opacity: 0; } }';
  document.head.appendChild(style);
</script>
</body>
</html>
